spring.application.name=ecommerce
# 数据源配置
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=abc123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.ecommerce.user.entity

# 打印SQL
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl